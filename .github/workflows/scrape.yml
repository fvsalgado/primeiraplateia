name: Scrape & Deploy

on:
  schedule:
    # Todos os dias às 07:00 UTC
    - cron: '0 7 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # ── 3. Sync scrapers ─────────────────────────────────────
      - name: Sincronizar scrapers
        run: python scripts/sync_scrapers.py

      - name: Commitar alterações de sync (se houver)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add theaters.json scraper.py
          git diff --staged --quiet || git commit -m "chore: sync scrapers [skip ci]"

      # ── 4. Scraper principal ─────────────────────────────────
      - name: Correr scraper
        run: python scraper.py

      # ── 5. Build — gera data/ no filesystem ─────────────────
      - name: Gerar artefactos de dados
        run: python scripts/build.py

      # ── 6. Verificar que data/ foi gerado ────────────────────
      - name: Verificar artefactos
        run: |
          echo "=== Ficheiros gerados ==="
          ls -lh data/ || echo "ERRO: data/ não foi gerado"
          python -c "
          import json
          try:
              m = json.load(open('data/meta.json'))
              print(f'OK meta.json: {m[\"total_events\"]} eventos, {m[\"total_theaters\"]} teatros')
          except Exception as e:
              print(f'ERRO meta.json: {e}')
          try:
              evs = json.load(open('data/events.slim.json'))
              print(f'OK events.slim.json: {len(evs)} eventos')
          except Exception as e:
              print(f'ERRO events.slim.json: {e}')
          "

      # ── 7. Commitar events.json para main ────────────────────
      - name: Commitar events.json
        run: |
          git add events.json validation_report.json
          git diff --staged --quiet || git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push || true

      # ── 8. Preparar pasta _site/ para deploy ─────────────────
      # Agrega tudo o que o site precisa numa pasta limpa.
      # IMPORTANTE: inclui data/ gerado em runtime — não está no repo.
      - name: Preparar pasta de deploy
        run: |
          mkdir -p _site

          # Assets estáticos
          cp -r design fonts _site/
          cp manifest.webmanifest robots.txt sitemap.xml llms.txt CNAME _site/ 2>/dev/null || true

          # Páginas HTML
          cp index.html 404.html _site/
          for dir in programacao calendario teatros espetaculo sobre privacidade aviso-legal acessibilidade; do
            [ -d "$dir" ] && cp -r "$dir" _site/
          done

          # Dados — gerados em runtime pelo scraper + build.py
          cp -r data _site/
          cp events.json theaters.json _site/

          echo "=== Conteúdo _site/ ==="
          find _site -maxdepth 3 -type f | sort

      # ── 9. Deploy para GitHub Pages ──────────────────────────
      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "deploy: ${{ github.sha }}"
          cname: primeiraplateia.pt

      # ── 10. Sumário ──────────────────────────────────────────
      - name: Sumário do workflow
        if: always()
        run: |
          echo "## Primeira Plateia — Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          try:
              m = json.load(open('data/meta.json'))
              print('| Campo | Valor |')
              print('|---|---|')
              print(f'| Teatros | {m.get(\"total_theaters\", \"?\")} |')
              print(f'| Espectaculos | {m.get(\"total_events\", \"?\")} |')
              print(f'| Completeness medio | {m.get(\"completeness_avg\", \"?\")} |')
              print(f'| Actualizado em | {m.get(\"updated_at\", \"?\")} |')
              anomalies = m.get('anomalies', [])
              if anomalies:
                  print(f'| Anomalias | {len(anomalies)} teatro(s) |')
              else:
                  print('| Anomalias | Nenhuma |')
          except Exception as e:
              print(f'Erro ao ler meta.json: {e}')
          " >> $GITHUB_STEP_SUMMARY || true
