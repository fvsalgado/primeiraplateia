name: Scrape & Deploy

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Sincronizar scrapers
        run: python scripts/sync_scrapers.py

      - name: Commitar sync (se houver alterações)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add theaters.json scraper.py
          git diff --staged --quiet || git commit -m "chore: sync scrapers [skip ci]"

      - name: Correr scraper
        run: python scraper.py

      - name: Instalar dependências de stats
        run: |
          pip install \
            google-analytics-data \
            google-api-python-client \
            google-auth \
            --break-system-packages
        continue-on-error: true

      - name: Fetch stats
        env:
          GA4_PROPERTY_ID:        ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GSC_SITE_URL:           ${{ secrets.GSC_SITE_URL }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID:           ${{ secrets.META_PAGE_ID }}
          META_IG_USER_ID:        ${{ secrets.META_IG_USER_ID }}
        run: python scripts/fetch_stats.py
        continue-on-error: true

      - name: Debug — verificar events.json
        run: |
          echo "=== events.json existe? ==="
          ls -lh events.json || echo "NAO EXISTE"
          echo "=== primeiras linhas ==="
          head -5 events.json || true
          echo "=== total de eventos ==="
          python3 -c "
          import json
          d = json.load(open('events.json'))
          if isinstance(d, dict):
              print(f'dict com {len(d.get(\"events\",[]))} eventos')
          elif isinstance(d, list):
              print(f'lista com {len(d)} eventos')
          "

      - name: Gerar artefactos (build.py)
        run: python scripts/build.py

      - name: Debug — verificar data/
        run: |
          echo "=== data/ existe? ==="
          ls -lh data/ || echo "NAO EXISTE"
          echo "=== data/meta.json ==="
          cat data/meta.json || echo "NAO EXISTE"
          echo "=== data/by-theater/ ==="
          ls data/by-theater/ || echo "VAZIO"

      - name: Commitar events.json para main
        run: |
          git add events.json validation_report.json
          git diff --staged --quiet || git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push || true

      - name: Preparar pasta _site/ para deploy
        run: |
          set -e
          mkdir -p _site

          echo "--- a copiar assets estaticos ---"
          cp -r design fonts _site/
          cp manifest.webmanifest robots.txt sitemap.xml llms.txt CNAME _site/ 2>/dev/null || true

          echo "--- a copiar paginas HTML ---"
          cp index.html 404.html _site/
          for dir in programacao calendario teatros espetaculo sobre privacidade aviso-legal acessibilidade perto-de-mim stats; do
            if [ -d "$dir" ]; then
              cp -r "$dir" _site/
              echo "  copiado: $dir/"
            else
              echo "  AVISO: $dir/ nao existe"
            fi
          done

          echo "--- a copiar dados ---"
          if [ -d "data" ]; then
            cp -r data _site/
            echo "  copiado: data/ ($(ls data/ | wc -l) ficheiros)"
          else
            echo "  ERRO CRITICO: data/ nao existe — build.py falhou?"
            exit 1
          fi

          cp events.json _site/
          cp theaters.json _site/

          echo "--- conteudo _site/ ---"
          find _site -type f | sort

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "deploy: ${{ github.sha }}"
          cname: primeiraplateia.pt

      - name: Sumário
        if: always()
        run: |
          echo "## Primeira Plateia — Build Summary" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json, os
          try:
              m = json.load(open('data/meta.json'))
              print('| Campo | Valor |')
              print('|---|---|')
              print(f'| Teatros | {m.get(\"total_theaters\", \"?\")} |')
              print(f'| Em cartaz | {m.get(\"total_events\", \"?\")} |')
              print(f'| Em cena hoje | {m.get(\"events_today\", \"?\")} |')
              print(f'| Este fim-de-semana | {m.get(\"events_this_weekend\", \"?\")} |')
              cidades = m.get(\"cities\", [])
              print(f'| Cidades | {\" · \".join(cidades) if cidades else \"?\"} |')
              anomalias = m.get(\"anomalias\", [])
              print(f'| Anomalias | {len(anomalias)} |')
              if anomalias:
                  for a in anomalias:
                      print(f'| ⚠️ | {a} |')
              print(f'| Actualizado | {m.get(\"updated_at\", \"?\")} |')
          except Exception as e:
              print(f'Erro: {e}')
          " >> $GITHUB_STEP_SUMMARY || true
